<nz-card class="category-card" nzBordered="false" (click)="onClick(card)">
  <div class="category-container">
    <div class="category-left">
      <div class="category-title">{{ card.name }}</div>
      <div class="category-desc">{{ card.description }}</div>
    </div>

    <div class="category-right">
      <div class="category-image">
        <nz-icon nzType="book" nzTheme="outline"></nz-icon>
      </div>
    </div>
  </div>
</nz-card>
