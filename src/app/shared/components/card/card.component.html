<nz-card
  class="product-card"
  nzBordered="false"
  (click)="onNavigate(card.url ?? '/')"
>
  <div class="card-container">
    <!-- LEFT -->
    <div class="card-left">
      <div class="card-title">{{ card.name | translate }}</div>
      <div class="card-description">
        {{ card.description ?? "" | translate }}
      </div>
    </div>

    <!-- RIGHT -->
    <div class="card-icon">
      <span nz-icon [nzType]="card.icon" nzTheme="outline"></span>
    </div>
  </div>
</nz-card>
