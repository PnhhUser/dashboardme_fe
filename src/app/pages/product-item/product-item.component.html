<app-header>
  <div start>
    <nz-icon nzType="rollback" nzTheme="outline" (click)="onBack()"></nz-icon>
  </div>

  <div title>{{ "data.product.title" | translate }}</div>

  <!-- remove icon -->
  <div end>
    <nz-icon
      nzType="delete"
      nzTheme="outline"
      class="delete-icon"
      (click)="onRemove()"
    ></nz-icon>
  </div>
</app-header>

<div class="product-page">
  <div class="product-detail">
    <!-- IMAGE -->
    <nz-carousel nzAutoPlay class="product-carousel">
      <div nz-carousel-content *ngFor="let img of images">
        <img [src]="img" class="product-image" />
      </div>
    </nz-carousel>

    <div class="product-info">
      <div class="product-code">DSFSD87</div>

      <h1 class="product-name">Bút bi</h1>

      <div class="product-tags">
        <nz-tag nzColor="blue">Giáo dục</nz-tag>

        <nz-tag nzColor="green">
          <nz-icon nzType="check-circle"></nz-icon>
          Đang bán
        </nz-tag>
      </div>

      <div class="product-meta">
        <div>Stock: <span>50</span></div>
        <div>Price: <span>500</span></div>
      </div>

      <div class="product-datetime">
        <div>
          <nz-icon nzType="calendar"></nz-icon>
          Created: 15/03/2026
        </div>

        <div>
          <nz-icon nzType="clock-circle"></nz-icon>
          Updated: 16/03/2026
        </div>
      </div>

      <nz-divider></nz-divider>

      <div class="product-section">
        <h3>Description</h3>

        <p class="product-description">
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Ullam eos
          rerum veritatis pariatur dignissimos architecto.
        </p>
      </div>
    </div>
  </div>

  <!-- FIXED BUTTON -->
  <div class="product-actions">
    <button nz-button nzType="primary" nzBlock (click)="onUpdate()">
      <nz-icon nzType="edit"></nz-icon>
      Update product
    </button>
  </div>
</div>
