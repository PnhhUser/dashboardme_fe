<app-header>
  <div title>{{ "data.title" | translate }}</div>
  <div end>
    <nz-icon
      nzType="align-right"
      nzTheme="outline"
      (click)="onMenuDrawer()"
    ></nz-icon>
  </div>
</app-header>

<div class="container-data">
  @for (card of cardList; track card.name) {
    <app-card [card]="card" />
  }
</div>
